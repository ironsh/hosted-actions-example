dns:
  listen: ":53"
  proxy_ip: "127.0.0.1"
  upstream_resolver: "8.8.8.8:53"

proxy:
  http_listen: ":80"
  https_listen: ":443"

tls:
  ca_cert: "/tmp/iron-proxy-ca/ca.crt"
  ca_key: "/tmp/iron-proxy-ca/ca.key"

transforms:
  - name: allowlist
    config:
      domains:
        # GitHub Actions infrastructure
        - "github.com"
        - "*.github.com"
        - "*.githubusercontent.com"
        - "*.actions.githubusercontent.com"
        - "*.pkg.github.com"
        - "*.blob.core.windows.net"
        - "api.github.com"
        # Stuff your build needs
        - "nodejs.org"
        - "*.nodejs.org"
        - "*.npmjs.org"

log:
  level: "info"
